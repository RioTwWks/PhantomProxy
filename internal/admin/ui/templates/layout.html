{{define "layout"}}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} — PhantomProxy</title>
  <link rel="stylesheet" href="/ui/static/style.css">
  <script src="/ui/static/htmx.min.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">PhantomProxy</div>
      <nav>
        <a href="/ui/" {{if eq .Active "dashboard"}}class="active"{{end}}>Дашборд</a>
        <a href="/ui/users" {{if eq .Active "users"}}class="active"{{end}}>Пользователи</a>
        <a href="/ui/settings" {{if eq .Active "settings"}}class="active"{{end}}>Настройки</a>
      </nav>
    </aside>
    <main class="main">
      {{if .Flash}}
      <div class="alert alert-success">{{.Flash}}</div>
      {{end}}
      {{if .Error}}
      <div class="alert alert-error">{{.Error}}</div>
      {{end}}
      {{template "content" .}}
    </main>
  </div>
  <script src="/ui/static/app.js"></script>
</body>
</html>
{{end}}
