version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: dummy-site
    ports:
      - "8080:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-proxy
    ports:
      - "8443:8443"
      - "8081:8081"
      - "9090:9090"
    environment:
      PHANTOM_FALLBACK_UPSTREAM: "http://web:80"
      PHANTOM_MANAGEMENT_TOKEN: "change-me-in-production"
    volumes:
      - ./configs:/app/configs:ro
    depends_on:
      - web
    restart: unless-stopped
