name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Unit tests
        run: GOTOOLCHAIN=local go test -race ./...

      - name: Integration tests
        run: GOTOOLCHAIN=local go test -race -tags=integration ./internal/proxy/...

      - name: Build
        run: GOTOOLCHAIN=local go build -o telegram-proxy ./cmd/proxy
