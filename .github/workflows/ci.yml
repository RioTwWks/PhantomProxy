name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Unit tests
        run: GOTOOLCHAIN=local go test -race ./...

      - name: Integration tests
        run: GOTOOLCHAIN=local go test -race -tags=integration ./internal/proxy/...

      - name: Fuzz tests
        run: |
          GOTOOLCHAIN=local go test -fuzz=FuzzParseClientHello -fuzztime=30s ./internal/faketls/
          GOTOOLCHAIN=local go test -fuzz=FuzzIsHandshakeRecord -fuzztime=15s ./internal/faketls/
          GOTOOLCHAIN=local go test -fuzz=FuzzParseSecret -fuzztime=30s ./internal/mtproto/

      - name: Build
        run: GOTOOLCHAIN=local go build -o telegram-proxy ./cmd/proxy

  e2e-telegram:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: E2E против реального Telegram
        env:
          PHANTOM_E2E_TELEGRAM: "1"
        run: GOTOOLCHAIN=local go test -race -tags=realtelegram -timeout=2m ./internal/proxy/...
